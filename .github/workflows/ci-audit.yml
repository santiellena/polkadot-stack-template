name: CI — Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 1" # every Monday

concurrency:
  group: ci-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cargo-audit
      - run: cargo audit --ignore RUSTSEC-2025-0009 # ring 0.16.20 via polkadot-sdk; can't upgrade

  npm:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [web, contracts/evm, contracts/pvm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm audit --audit-level=high
        working-directory: ${{ matrix.dir }}
